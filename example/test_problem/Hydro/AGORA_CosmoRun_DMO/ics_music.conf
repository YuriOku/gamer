# Taken from Appendix A of Kim et al. (2014; https://doi.org/10.1088/0067-0049/210/1/14)
[setup]
boxlength = 60
zstart = 100
levelmin = 7
levelmin_TF = 9
levelmax = 12
padding = 9
overlap = 4
ref_offset = 0.618, 0.550, 0.408
ref_extent = 0.048, 0.065, 0.047
align_top = yes
periodic_TF = no
baryons = no
use_2LPT = no
use_LLA = no
center_vel = no
blocking_factor = 8

[cosmology]
Omega_m = 0.272
Omega_L = 0.728
Omega_b = 0.0455
H0 = 70.2
sigma_8 = 0.807
nspec = 0.961
transfer = eisenstein

[random] 
cubesize = 256 
seed[8] = 95064 
seed[9] = 31415 
seed[10] = 27183

[poisson]
fft_fine = yes 
accuracy = 1e-4
grad_order = 6 
laplace_order = 6

[output]
format = gamer2
filename = UM_IC
parfilename = PAR_IC